<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Room</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Sparkle Background -->
<div class="sparkle-layer"></div>

<!-- Entry Screen -->
<div id="entryScreen" class="entry-screen">
  <div class="glass-card">
    <h2>Private Room</h2>
    <p>This space was reserved.</p>
    <input type="text" id="nameInput" placeholder="Enter your name">
    <button onclick="unlockRoom()">Enter</button>
    <p id="entryMessage"></p>
  </div>
</div>

<!-- Chat App -->
<div id="chatApp" class="hidden">

  <!-- Header -->
  <div class="chat-header">
    <div>
      <h3>Priya</h3>
      <span class="status">online</span>
    </div>
  </div>

  <!-- Chat Messages -->
  <div id="chatBox" class="chat-box"></div>

  <!-- Typing Indicator -->
  <div id="typingIndicator" class="typing hidden">
    <span></span><span></span><span></span>
  </div>

  <!-- Input -->
  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type something..." onkeydown="handleKey(event)">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
