<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Chat Room</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="glass-card">
    <h2>Select Character</h2>

    <select id="characterSelect">
      <option value="">Choose</option>
      <option value="Priya">Priya</option>
      <option value="Raj">Raj</option>
      <option value="Aarushi">Aarushi</option>
    </select>

    <input type="password" id="passwordInput" placeholder="Enter Password">
    <button onclick="login()">Enter Room</button>
    <p id="loginMessage"></p>
  </div>
</div>

<div id="chatApp" class="hidden">

  <div class="chat-header">
    <h3>Private Room</h3>
    <span id="activeUser"></span>
  </div>

  <div id="chatBox" class="chat-box"></div>

  <div class="chat-input">
    <input type="text" id="messageInput" placeholder="Type message..." onkeydown="handleKey(event)">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
